<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huyền Học Xuân Trường - Lục Trận Đồ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050914;
            --gold: #ffd700;
            --glass-bg: rgba(15, 23, 42, 0.85);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, #1e293b 0%, #050914 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* TIÊU ĐỀ TRANG */
        .page-title {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 10;
        }
        .page-title h1 {
            color: var(--gold); font-size: 28px; margin: 0; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,215,0,0.5);
        }
        .page-title p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        /* VÒNG TRẬN ĐỒ TĨNH */
        .orbit-container {
            position: relative; width: 360px; height: 360px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,0.5) inset;
        }

        /* LỚP BỌC ĐỂ GIỮ VỊ TRÍ CỐ ĐỊNH */
        .bubble-wrapper {
            position: absolute; width: 80px; height: 80px;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Tọa độ 6 bóng (Tính bằng % để co giãn tốt trên mobile) */
        .pos-1 { top: 0%; left: 50%; } /* Cạnh trên */
        .pos-2 { top: 25%; left: 93.3%; } /* Trên phải */
        .pos-3 { top: 75%; left: 93.3%; } /* Dưới phải */
        .pos-4 { top: 100%; left: 50%; } /* Cạnh dưới */
        .pos-5 { top: 75%; left: 6.7%; } /* Dưới trái */
        .pos-6 { top: 25%; left: 6.7%; } /* Trên trái */

        /* CÁC BONG BÓNG DỊCH VỤ */
        .bubble-btn {
            width: 100%; height: 100%;
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; outline: none;
            box-shadow: 0 0 20px inset rgba(0,0,0,0.3), 0 0 15px var(--glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Hiệu ứng dập dềnh */
            animation: floatBob 3s ease-in-out infinite;
        }

        /* Làm lệch nhịp dập dềnh cho tự nhiên */
        .pos-2 .bubble-btn { animation-delay: 0.5s; }
        .pos-3 .bubble-btn { animation-delay: 1.0s; }
        .pos-4 .bubble-btn { animation-delay: 1.5s; }
        .pos-5 .bubble-btn { animation-delay: 2.0s; }
        .pos-6 .bubble-btn { animation-delay: 2.5s; }

        /* 6 Màu sắc riêng biệt */
        .color-pt { background: radial-gradient(circle, #10b981, #064e3b); --glow: #10b981; }
        .color-tv { background: radial-gradient(circle, #3b82f6, #1e3a8a); --glow: #3b82f6; }
        .color-kd { background: radial-gradient(circle, #f59e0b, #78350f); --glow: #f59e0b; }
        .color-ls { background: radial-gradient(circle, #f97316, #7c2d12); --glow: #f97316; }
        .color-cx { background: radial-gradient(circle, #8b5cf6, #4c1d95); --glow: #8b5cf6; }
        .color-dl { background: radial-gradient(circle, #ef4444, #7f1d1d); --glow: #ef4444; }

        .bubble-btn i { font-size: 24px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .bubble-btn span { font-size: 11px; font-weight: bold; text-align: center; text-transform: uppercase; line-height: 1.2; }

        /* KEYFRAME DẬP DỀNH */
        @keyframes floatBob {
            0%, 100% { margin-top: 0; }
            50% { margin-top: -15px; } /* Trôi lên 15px */
        }

        /* HIỆU ỨNG HOVER KIỂU MACBOOK */
        .bubble-wrapper:hover { z-index: 20; }
        .bubble-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 30px var(--glow), 0 0 10px #fff inset;
        }

        /* KHI CLICK VÀO (TRỒI HẲN LÊN VÀ DỪNG DẬP DỀNH) */
        .bubble-btn.active-bubble {
            transform: scale(1.3);
            margin-top: -25px !important; /* Trồi lên hẳn hoi */
            animation: none; /* Tắt dập dềnh */
            box-shadow: 0 0 50px var(--glow), 0 0 20px #fff inset;
            border: 2px solid #fff;
        }
        .bubble-wrapper:has(.active-bubble) { z-index: 30; }

        /* BẢNG LUẬN GIẢI (MODAL) */
        .info-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            width: 90%; max-width: 600px; max-height: 80vh;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            padding: 30px; overflow-y: auto;
            opacity: 0; visibility: hidden; transition: all 0.5s ease;
            z-index: 50;
        }

        .info-panel.show {
            opacity: 1; visibility: visible; transform: translate(-50%, -50%);
        }

        /* Nút Đóng */
        .close-btn {
            position: absolute; top: 15px; right: 20px;
            background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; transition: 0.3s;
        }
        .close-btn:hover { color: var(--gold); transform: rotate(90deg); }

        /* Trình bày văn bản trong Bảng */
        .info-content h2 { color: var(--gold); margin-top: 0; font-size: 22px; text-align: center; border-bottom: 1px dashed rgba(255,215,0,0.3); padding-bottom: 15px; }
        .info-content .intro-text { font-style: italic; color: #cbd5e1; text-align: center; margin-bottom: 20px; font-size: 15px; }
        .info-content h4 { color: #38bdf8; margin: 20px 0 10px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .info-content ul { list-style: none; padding-left: 10px; margin: 0; }
        .info-content li { position: relative; padding-left: 20px; margin-bottom: 8px; font-size: 14.5px; line-height: 1.5; color: #e2e8f0; }
        .info-content li::before { content: '•'; position: absolute; left: 0; color: var(--gold); font-size: 18px; line-height: 1; }
        
        .highlight-box {
            background: rgba(255, 215, 0, 0.1); border-left: 4px solid var(--gold);
            padding: 15px; margin-top: 25px; border-radius: 0 8px 8px 0;
            font-weight: 500; font-size: 15px; color: #fef08a;
        }

        /* Tuỳ chỉnh thanh cuộn cho đẹp */
        .info-panel::-webkit-scrollbar { width: 6px; }
        .info-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .info-panel::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.5); border-radius: 10px; }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .orbit-container { width: 280px; height: 280px; }
            .bubble-wrapper { width: 70px; height: 70px; }
            .info-panel { padding: 20px; width: 85%; }
        }
    </style>
</head>
<body>

    <div class="page-title">

        <p>Chạm vào vì sao để luận giải vận mệnh</p>

    <div class="orbit-container" id="orbit">

        </div>

            </button>

        <div class="bubble-wrapper pos-5">

        <div class="info-content" id="infoContent">
            </div>
    </div>

                    <li>Ổn định lại dòng khí, tạo sự an tâm</li>
                </ul>

                <div class="highlight-box">
                    💡 <b>Vai trò của cảm xạ:</b> Không làm riêng lẻ, mà là công cụ giúp xác định đúng vấn đề - xử lý đúng chỗ. Tăng độ chính xác cho toàn bộ các phương pháp khác. Tránh làm sai - sửa sai.
                </div>
            `,
            'dl': `
                <h2>CÚNG - LẬP ĐÀN LỄ<br><span style="font-size:16px; color:#fff;">ÂM DƯƠNG</span></h2>
                <div class="intro-text">"Cúng lễ không chỉ là nghi thức, mà là cách điều hòa âm dương - hóa giải - kích hoạt cát khí cho gia chủ."</div>
                
                <h4><i class="fa-solid fa-gem"></i> ĐÀN DƯƠNG (cho người sống):</h4>
                <ul>
                    <li>Cúng nhập trạch - về nhà mới</li>
                    <li>Cúng động thổ - sửa chữa - xây dựng</li>
                    <li>Cúng khai trương - mở đầu công việc</li>
                    <li>Cầu an - cầu tài - cầu lộc</li>
                </ul>

                <h4><i class="fa-solid fa-bullseye"></i> Mục đích:</h4>
                <ul>
                    <li>Khai thông vượng khí</li>
                    <li>Tăng tài khí - kích tài lộc</li>
                    <li>Giảm trừ tai ương, ách tắc</li>
                    <li>Ổn định tinh thần - sức khỏe</li>
                    <li>Tạo nền tảng vững cho vận khí</li>
                </ul>
            `
        };

        const infoPanel = document.getElementById('infoPanel');
        const infoContent = document.getElementById('infoContent');

        function showInfo(id, element) {
            // 1. Tắt active của các bóng cũ
            document.querySelectorAll('.bubble-btn').forEach(btn => {
                btn.classList.remove('active-bubble');
            });

            // 2. Bật active cho bóng mới bấm (Trồi lên, dừng dập dềnh, sáng rực)
            element.classList.add('active-bubble');

            // 3. Đổ văn bản vào
            infoContent.innerHTML = Data[id];

            // 4. Mở bảng
            infoPanel.classList.add('show');
        }

        function closeInfo() {
            infoPanel.classList.remove('show');
            document.querySelectorAll('.bubble-btn').forEach(btn => {
                btn.classList.remove('active-bubble');
            });
        }
    </script>
