<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huyền Học Xuân Trường - Lục Trận Đồ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* [Giữ nguyên toàn bộ CSS cũ của bà ở đây] */
        :root {
            --bg-deep: #050914;
            --gold: #ffd700;
            --glass-bg: rgba(15, 23, 42, 0.85);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, #1e293b 0%, #050914 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            display: flex; flex-direction: column; align-items: center; /* Đổi display để xếp tab */
            overflow: hidden;
        }

        /* TIÊU ĐỀ TRANG */
        .page-header {
            text-align: center; z-index: 10;
            margin-top: 2%; /* Đẩy xuống một xíu */
            margin-bottom: 20px;
        }
        .page-header h1 {
            color: var(--gold); font-size: 28px; margin: 0; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,215,0,0.5);
        }
        .page-header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        /* THIẾT KẾ MENU TAB */
        .tab-menu {
            display: flex; gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px; border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.2);
            z-index: 10; margin-bottom: 30px;
        }
        .tab-btn {
            background: transparent; border: none; color: #94a3b8;
            font-size: 16px; padding: 10px 20px; border-radius: 20px;
            cursor: pointer; transition: all 0.3s; font-weight: bold;
        }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active {
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        /* KHUNG CHỨA NỘI DUNG TAB */
        .tab-content {
            display: none; /* Mặc định ẩn hết */
            width: 100%; max-width: 1000px;
            height: 60vh; /* Giới hạn chiều cao */
            position: relative;
            justify-content: center; align-items: center;
        }
        .tab-content.active {
            display: flex; /* Chỉ hiện tab có class active */
        }

        /* CSS CŨ CHO VÒNG TRẬN ĐỒ */
        .orbit-container {
            position: relative; width: 360px; height: 360px;
            border-radius: 50%; border: 1px dashed rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,0.5) inset;
        }
        .bubble-wrapper { position: absolute; width: 80px; height: 80px; transform: translate(-50%, -50%); z-index: 10; }
        .pos-1 { top: 0%; left: 50%; } .pos-2 { top: 25%; left: 93.3%; } .pos-3 { top: 75%; left: 93.3%; }
        .pos-4 { top: 100%; left: 50%; } .pos-5 { top: 75%; left: 6.7%; } .pos-6 { top: 25%; left: 6.7%; }
        
        .bubble-btn {
            width: 100%; height: 100%; border-radius: 50%; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; outline: none;
            box-shadow: 0 0 20px inset rgba(0,0,0,0.3), 0 0 15px var(--glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatBob 3s ease-in-out infinite;
        }
        .pos-2 .bubble-btn { animation-delay: 0.5s; } .pos-3 .bubble-btn { animation-delay: 1.0s; }
        .pos-4 .bubble-btn { animation-delay: 1.5s; } .pos-5 .bubble-btn { animation-delay: 2.0s; } .pos-6 .bubble-btn { animation-delay: 2.5s; }
        
        .color-pt { background: radial-gradient(circle, #10b981, #064e3b); --glow: #10b981; }
        .color-tv { background: radial-gradient(circle, #3b82f6, #1e3a8a); --glow: #3b82f6; }
        .color-kd { background: radial-gradient(circle, #f59e0b, #78350f); --glow: #f59e0b; }
        .color-ls { background: radial-gradient(circle, #f97316, #7c2d12); --glow: #f97316; }
        .color-cx { background: radial-gradient(circle, #8b5cf6, #4c1d95); --glow: #8b5cf6; }
        .color-dl { background: radial-gradient(circle, #ef4444, #7f1d1d); --glow: #ef4444; }

        .bubble-btn i { font-size: 24px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .bubble-btn span { font-size: 11px; font-weight: bold; text-align: center; text-transform: uppercase; line-height: 1.2; }
        @keyframes floatBob { 0%, 100% { margin-top: 0; } 50% { margin-top: -15px; } }
        .bubble-wrapper:hover { z-index: 20; }
        .bubble-btn:hover { transform: scale(1.15); box-shadow: 0 0 30px var(--glow), 0 0 10px #fff inset; }
        .bubble-btn.active-bubble { transform: scale(1.3); margin-top: -25px !important; animation: none; box-shadow: 0 0 50px var(--glow), 0 0 20px #fff inset; border: 2px solid #fff; }
        .bubble-wrapper:has(.active-bubble) { z-index: 30; }

        /* BẢNG LUẬN GIẢI (MODAL) TRONG TAB TRANG CHỦ */
        .info-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            width: 90%; max-width: 600px; max-height: 80vh;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); padding: 30px; overflow-y: auto;
            opacity: 0; visibility: hidden; transition: all 0.5s ease; z-index: 50;
        }
        .info-panel.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%); }
        .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: var(--gold); transform: rotate(90deg); }
        .info-content h2 { color: var(--gold); margin-top: 0; font-size: 22px; text-align: center; border-bottom: 1px dashed rgba(255,215,0,0.3); padding-bottom: 15px; }
        .info-content .intro-text { font-style: italic; color: #cbd5e1; text-align: center; margin-bottom: 20px; font-size: 15px; }
        .info-content h4 { color: #38bdf8; margin: 20px 0 10px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .info-content ul { list-style: none; padding-left: 10px; margin: 0; }
        .info-content li { position: relative; padding-left: 20px; margin-bottom: 8px; font-size: 14.5px; line-height: 1.5; color: #e2e8f0; }
        .info-content li::before { content: '•'; position: absolute; left: 0; color: var(--gold); font-size: 18px; line-height: 1; }
        .highlight-box { background: rgba(255, 215, 0, 0.1); border-left: 4px solid var(--gold); padding: 15px; margin-top: 25px; border-radius: 0 8px 8px 0; font-weight: 500; font-size: 15px; color: #fef08a; }

        /* THIẾT KẾ MÀN HÌNH CHAT MỚI */
        .chat-layout {
            display: flex; width: 100%; height: 100%; gap: 20px;
            background: rgba(15, 23, 42, 0.6); border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Cột Liên hệ bên trái */
        .chat-sidebar {
            width: 250px; background: rgba(0,0,0,0.4); border-right: 1px solid rgba(255,215,0,0.2);
            display: flex; flex-direction: column;
        }
        .chat-sidebar-header {
            padding: 20px; border-bottom: 1px solid rgba(255,215,0,0.1);
            color: var(--gold); font-weight: bold; font-size: 18px; text-align: center;
        }
        .contact-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .contact-item {
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .contact-item:hover { background: rgba(255,215,0,0.1); }
        .contact-item.active-contact { background: rgba(255,215,0,0.2); border-left: 4px solid var(--gold); }
        .contact-icon {
            width: 40px; height: 40px; border-radius: 50%; background: #1e293b;
            display: flex; justify-content: center; align-items: center; color: var(--gold); font-size: 18px;
        }
        .contact-info h5 { margin: 0; font-size: 15px; color: #fff; }
        .contact-info p { margin: 2px 0 0; font-size: 12px; color: #94a3b8; }

        /* Khung hiển thị chat bên phải */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-main-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,215,0,0.1); display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); }
        .chat-main-header h3 { margin: 0; color: #fff; font-size: 18px; }
        
        #chatBox {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .chat-input-area {
            padding: 15px; border-top: 1px solid rgba(255,215,0,0.1); background: rgba(0,0,0,0.4);
            display: flex; gap: 10px;
        }
        #msgInput {
            flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.3);
            background: rgba(15, 23, 42, 0.8); color: white; outline: none; transition: 0.3s;
        }
        #msgInput:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .send-btn {
            background: var(--gold); color: #000; border: none; padding: 0 20px; border-radius: 20px;
            cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .send-btn:hover { background: #fff; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="page-header">
        <h1>Huyền Học Xuân Trường</h1>
        <p>Chạm vào vì sao để luận giải vận mệnh</p>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-home', this)"><i class="fa-solid fa-dharmachakra"></i> Lục Trận Đồ</button>
        <button class="tab-btn" onclick="switchTab('tab-chat', this)"><i class="fa-regular fa-comments"></i> Hội Thoại</button>
    </div>

    <div id="tab-home" class="tab-content active">
        <div class="orbit-container" id="orbit">
            <div class="bubble-wrapper pos-1"><button class="bubble-btn color-pt" onclick="showInfo('pt', this)"><i class="fa-solid fa-compass"></i><span>Phong<br>Thủy</span></button></div>
            <div class="bubble-wrapper pos-2"><button class="bubble-btn color-tv" onclick="showInfo('tv', this)"><i class="fa-solid fa-moon"></i><span>Tử<br>Vi</span></button></div>
            <div class="bubble-wrapper pos-3"><button class="bubble-btn color-kd" onclick="showInfo('kd', this)"><i class="fa-solid fa-yin-yang"></i><span>Kinh<br>Dịch</span></button></div>
            <div class="bubble-wrapper pos-4"><button class="bubble-btn color-ls" onclick="showInfo('ls', this)"><i class="fa-solid fa-calendar-days"></i><span>Lục<br>Sự</span></button></div>
            <div class="bubble-wrapper pos-5"><button class="bubble-btn color-cx" onclick="showInfo('cx', this)"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Cảm<br>Xạ</span></button></div>
            <div class="bubble-wrapper pos-6"><button class="bubble-btn color-dl" onclick="showInfo('dl', this)"><i class="fa-solid fa-om"></i><span>Cúng<br>Lễ</span></button></div>
        </div>

        <div class="info-panel" id="infoPanel">
            <button class="close-btn" onclick="closeInfo()"><i class="fa-solid fa-xmark"></i></button>
            <div class="info-content" id="infoContent"></div>
        </div>
    </div>

    <div id="tab-chat" class="tab-content">
        <div class="chat-layout">
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">Kết nối Tâm Linh</div>
                <ul class="contact-list">
                    <li class="contact-item active-contact" onclick="switchContact('Tư vấn với Thầy Xuân Trường', this)">
                        <div class="contact-icon"><i class="fa-solid fa-user-tie"></i></div>
                        <div class="contact-info">
                            <h5>Thầy Xuân Trường</h5>
                            <p>Tư vấn kín 1-1</p>
                        </div>
                    </li>
                    <li class="contact-item" onclick="switchContact('Kênh Luận Giải Chung', this)">
                        <div class="contact-icon"><i class="fa-solid fa-users"></i></div>
                        <div class="contact-info">
                            <h5>Kênh Trà Đạo Chung</h5>
                            <p>Thảo luận mở</p>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="chat-main">
                <div class="chat-main-header">
                    <i class="fa-solid fa-circle-dot" style="color: #10b981; font-size: 12px;"></i>
                    <h3 id="current-chat-title">Tư vấn với Thầy Xuân Trường</h3>
                </div>
                
                <div id="chatBox">
                    <div style="text-align: center; color: #94a3b8; font-size: 12px; margin-top: 10px;">Bắt đầu cuộc trò chuyện...</div>
                </div>

                <div class="chat-input-area">
                    <input type="text" id="msgInput" placeholder="Nhập tin nhắn để thầy tư vấn..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">Gửi <i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DỮ LIỆU CŨ CỦA BÀ
const Data = {
            'pt': `
                <h2>🔮 PHONG THỦY ỨNG DỤNG<br><span style="font-size:16px; color:#fff;">CẢI VẬN THỰC TẾ 🔮</span></h2>
                <div class="intro-text">"Áp dụng đồng thời 5 phương pháp: Loan Đầu – Bát Trạch – Huyền Không Phi Tinh – Huyền Không Đại Quái – Liên Thành phái, giúp đưa ra giải pháp tối ưu và phù hợp nhất cho từng ngôi nhà."</div>
                <div style="text-align: center; margin-bottom: 15px; color: #cbd5e1; font-size: 14.5px;">Nhận tư vấn và xử lý toàn diện phong thủy Dương trạch (nhà ở) và Âm trạch (mộ phần): Nhà mới làm cho đẹp – nhà cũ chỉnh cho hợp.</div>
                
                <h4><i class="fa-solid fa-house-chimney"></i> Dương trạch:</h4>
                <ul>
                    <li>Bố trí cửa chính đón tài – lộc – quý nhân</li>

                    <li>Sắp xếp giường ngủ ổn định sức khỏe</li>
                </ul>

                <h4><i class="fa-solid fa-yin-yang"></i> Âm trạch:</h4>
                <ul>
                    <li>Đặt mộ theo phương pháp truyền thống kết hợp thực tế</li>
                    <li>Điều chỉnh hướng mộ để phát con cháu</li>
                </ul>

                <h4><i class="fa-solid fa-bullseye"></i> Quan điểm:</h4>
                <ul style="list-style: none;">
                    <li style="color: #e2e8f0;">👉 Hạn chế đập phá, tận dụng hiện trạng, điều chỉnh tinh tế để đạt hiệu quả cao.</li>
                </ul>

                <div class="highlight-box">
                    ✨ Nhận tư vấn từ đầu, quy hoạch nghĩa trang, thiết kế nhà thờ họ theo nguyên lý chuẩn.

            'tv': `
                <h2>TỬ VI – LUẬN GIẢI CUỘC ĐỜI<br><span style="font-size:16px; color:#fff;">& ĐỊNH HƯỚNG VẬN MỆNH</span></h2>

                <div style="text-align: center; margin-bottom: 15px; color: #cbd5e1; font-size: 14.5px;">Từ đó đưa ra cái nhìn tổng thể về cuộc đời gia chủ trên nhiều phương diện: hoàn cảnh, môi trường, năng lực, sức khỏe và vận trình phát triển.</div>
                
                <h4><i class="fa-solid fa-book-open"></i> Nội dung phân tích:</h4>
                <ul>
                    <li>Hoàn cảnh sinh ra và cách ứng xử với thuận – nghịch cảnh</li>
                    <li>Môi trường sống, cơ hội và xung đột</li>
                    <li>Năng lực bản thân và nền tảng sức khỏe</li>
                    <li>Định hướng vận mệnh theo hướng chủ động</li>

                <h4><i class="fa-solid fa-lightbulb"></i> Quan điểm:</h4>
                <ul style="list-style: none;">

                <div class="highlight-box">

            'kd': `
                <h2>KINH DỊCH – LUẬN QUẺ<br><span style="font-size:16px; color:#fff;">DẪN ĐƯỜNG QUYẾT ĐỊNH</span></h2>
                <div class="intro-text">"Kinh Dịch không chỉ dùng để dự đoán mà là công cụ giúp phân tích và đưa ra quyết định trong thực tế."</div>

                <h4><i class="fa-solid fa-chart-line"></i> Nội dung luận giải:</h4>
                <ul>
                    <li>Luận diễn biến: hiện tại – tương lai – kết quả</li>

                </div>

            'ls': `
                <h2>LỤC SỰ – CHỌN NGÀY GIỜ<br><span style="font-size:16px; color:#fff;">& DỤNG SỰ CHÍNH XÁC</span></h2>
                <div class="intro-text">"Lục sự là phương pháp xác định thời điểm phù hợp để thực hiện công việc, giúp tăng thuận lợi và giảm rủi ro trong mọi việc lớn nhỏ."</div>
                
                <h4><i class="fa-solid fa-calendar-check"></i> Nội dung dụng sự:</h4>

                    <li>Đánh giá vận hạn, tên tuổi, CCCD, số điện thoại</li>
                    <li>Đặt tên theo quy luật cổ truyền</li>
                </ul>

                <h4><i class="fa-solid fa-layer-group"></i> Ứng dụng:</h4>
                <ul style="list-style: none;">
                    <li style="color: #e2e8f0;">👉 Áp dụng linh hoạt cho cả dương sự và âm phần.</li>
                </ul>

                <div class="highlight-box">
                    ✨ <b>Đặc biệt:</b><br>
                    - Xử lý các trường hợp bắt buộc phải làm nhưng chưa có thời điểm đẹp.<br>
                    - Hóa giải trùng tang liên táng.<br>
                    - Kết hợp nhiều phương pháp để đưa ra thời điểm tối ưu.
                </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDDKpPiRFaIyLAcatjZ4p21rwbQoy9-qgI",
    authDomain: "huyenhocxuantruong.firebaseapp.com",
    // BÀ PHẢI THÊM DÒNG NÀY VÀO:
    databaseURL: "https://huyenhocxuantruong-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "huyenhocxuantruong",
    storageBucket: "huyenhocxuantruong.firebasestorage.app",
    messagingSenderId: "236633869056",
    appId: "1:236633869056:web:3ae0a9b083c3cf2e7641e5",
    measurementId: "G-KJ1DH2Y8B3"
  };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'global_messages');

        // Hàm render hiển thị tin nhắn
        function renderMessage(msg) {
            const chatBox = document.getElementById('chatBox');
            if(!chatBox) return;

            const msgElement = document.createElement('div');
            
            // Căn chỉnh flex để thời gian nằm chuẩn ở góc
            msgElement.style.display = "flex";
            msgElement.style.flexDirection = "column";

            if(msg.user === "Khách") {
                msgElement.style.alignSelf = "flex-end"; // Đẩy Khách sang phải
                msgElement.style.background = "rgba(255, 215, 0, 0.15)";
                msgElement.style.border = "1px solid rgba(255,215,0,0.3)";
                msgElement.style.borderRadius = "15px 15px 0px 15px"; // Vát góc dưới phải
            } else {
                msgElement.style.alignSelf = "flex-start"; // Đẩy Thầy sang trái
                msgElement.style.background = "rgba(255,255,255,0.05)";
                msgElement.style.border = "1px solid rgba(255,255,255,0.1)";
                msgElement.style.borderRadius = "15px 15px 15px 0px"; // Vát góc dưới trái
            }

            msgElement.style.padding = "10px 15px";
            msgElement.style.width = "fit-content";
            msgElement.style.maxWidth = "75%";
            msgElement.style.margin = "8px 0";

            const date = new Date(msg.timestamp);
            const timeString = date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            msgElement.innerHTML = `
                <div style="margin-bottom: 3px;">
                    <strong style="color: var(--gold); font-size: 13px;">${msg.user}</strong> 
                </div>
                <div style="color: #e2e8f0; font-size: 15px; word-wrap: break-word;">
                    ${msg.text}
                </div>
                <div style="font-size: 10px; color: #64748b; align-self: flex-end; margin-top: 5px;">
                    ${timeString}
                </div>
            `;
            
            chatBox.appendChild(msgElement);
            
            // Tự động cuộn xuống tin nhắn mới nhất
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 50);
        }

        // Xóa dòng "Bắt đầu cuộc trò chuyện..." để lấy chỗ in lịch sử
        document.getElementById('chatBox').innerHTML = '';

        // Tự động load lịch sử cũ và nghe tin nhắn mới (Siêu chuẩn)
        onChildAdded(chatRef, (data) => {
            renderMessage(data.val());
        });

        window.sendMessage = function() {
            const msgInput = document.getElementById('msgInput');
            if (msgInput && msgInput.value.trim() !== "") {
                push(chatRef, {
                    user: "Khách", 
                    text: msgInput.value,
                    timestamp: Date.now()
                });
                msgInput.value = "";
            }
        }
    </script>
    </script>
